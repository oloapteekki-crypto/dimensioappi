<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dimensioiden tarkistusappi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;padding:1rem;max-width:480px;margin:0 auto}
h1{font-size:17px;font-weight:600;margin-bottom:1rem}
.upload-area{border:1.5px dashed #bbb;border-radius:12px;padding:1.5rem 1rem;text-align:center;cursor:pointer;background:#fff;display:block}
.upload-area:hover{background:#f0f0f0}
.upload-area input{display:none}
.divider{display:flex;align-items:center;gap:8px;margin:.75rem 0}
.divider span{font-size:12px;color:#999}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e0e0e0}
.btn{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:14px;color:#333;transition:all .15s}
.btn:hover{background:#f5f5f5}
.btn.primary{background:#1D9E75;border-color:#1D9E75;color:#fff;font-weight:500}
.btn.primary:hover{background:#0F6E56}
.btn.secondary{background:#f0f0f0;border-color:#ddd}
.top-bar{display:flex;gap:8px;margin-bottom:1rem;align-items:center}
.progress-wrap{background:#e8e8e8;border-radius:6px;height:6px;margin-bottom:8px;overflow:hidden}
.progress-fill{height:100%;background:#1D9E75;border-radius:6px;transition:width .3s}
.status-row{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:1rem}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.25rem;margin-bottom:.75rem}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:.75rem}
.card-idx{font-size:12px;color:#aaa;font-weight:600;min-width:22px}
.card-name{flex:1;font-size:14px;font-weight:600;color:#111;line-height:1.4}
.card-sku{font-size:11px;color:#aaa;margin-top:2px}
.badge{font-size:11px;padding:2px 8px;border-radius:6px;white-space:nowrap;font-weight:600}
.badge.tilaus{background:#e8f0fe;color:#1a56db}
.loc-box{border-radius:10px;padding:10px 14px;margin-bottom:.75rem;background:#f5f5f5;border:1px solid #ddd}
.loc-label{font-size:10px;color:#999;margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em}
.loc-code{font-size:22px;font-weight:700;color:#111;letter-spacing:.04em}
.ref-dims{font-size:12px;color:#777;margin-bottom:.75rem;text-align:center}
.ref-dims strong{color:#333}
.dim-inputs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:.75rem}
.dim-group label{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px}
.dim-group input{width:100%;padding:10px 8px;border-radius:8px;border:1px solid #ddd;font-size:18px;font-weight:600;text-align:center;background:#fff;-moz-appearance:textfield}
.dim-group input::-webkit-outer-spin-button,
.dim-group input::-webkit-inner-spin-button{-webkit-appearance:none}
.dim-group input:focus{outline:none;border-color:#1D9E75;box-shadow:0 0 0 2px #1D9E7530}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1;padding:10px 8px;font-size:13px}
.btn.skip-btn{color:#999;border-color:#e0e0e0}
.card.done{opacity:.35}
.summary{text-align:center;padding:2rem 1rem;background:#fff;border-radius:12px;border:1px solid #e8e8e8}
.summary h2{font-size:22px;font-weight:700;margin-bottom:6px}
.summary p{font-size:14px;color:#666;margin-bottom:1.5rem}
.stat-row{display:flex;gap:8px;margin-bottom:1.5rem}
.stat{flex:1;background:#f5f5f5;border-radius:8px;padding:10px;text-align:center}
.stat-val{font-size:22px;font-weight:700;color:#111}
.stat-lbl{font-size:11px;color:#999;margin-top:2px}
.export-btn{width:100%;padding:12px;border-radius:8px;border:none;background:#1D9E75;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px}
.export-btn:hover{background:#0F6E56}
</style>
</head>
<body>
<h1>📐 Dimensioiden tarkistusappi</h1>

<div id="loading-view" style="text-align:center;padding:3rem 1rem;display:block">
  <div style="font-size:32px;margin-bottom:12px">⏳</div>
  <div style="font-size:14px;color:#555">Haetaan dataa...</div>
  <div id="load-error" style="display:none;margin-top:1rem;padding:1rem;background:#fff0f0;border-radius:8px;border:1px solid #fcc;font-size:13px;color:#c0392b"></div>
  <button class="btn" id="retry-btn" style="display:none;margin-top:1rem;width:auto;padding:10px 20px" onclick="fetchData()">🔄 Yritä uudelleen</button>
</div>

<div id="main-view" style="display:none">
  <div class="top-bar">
    <select id="count-sel" onchange="reloadItems()" style="flex:1;padding:9px 8px;border-radius:8px;border:1px solid #ddd;font-size:13px">
      <option value="20">Top 20</option>
      <option value="50">Top 50</option>
      <option value="100">Top 100</option>
      <option value="9999">Kaikki</option>
    </select>
    <button class="btn secondary" style="flex:1;padding:9px 8px;font-size:13px" onclick="exportCsv()">⬇ Vie CSV</button>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="prog"></div></div>
  <div class="status-row">
    <span id="status-label">Syötä olo-dimensiot</span>
    <span id="done-count">0 / 0</span>
  </div>
  <div id="cards-container"></div>
  <div id="summary-view" style="display:none">
    <div class="summary">
      <h2>✅ Valmis!</h2>
      <p>Kaikki dimensiot tarkistettu.</p>
      <div class="stat-row">
        <div class="stat"><div class="stat-val" id="sum-done">0</div><div class="stat-lbl">syötetty</div></div>
        <div class="stat"><div class="stat-val" id="sum-skip">0</div><div class="stat-lbl">ohitettu</div></div>
      </div>
      <button class="export-btn" onclick="exportCsv()">⬇ Lataa CSV</button>
      <button class="btn" onclick="resetSession()">Uusi kierros</button>
    </div>
  </div>
</div>

const AISLE_ORDER=["L1","FA","L2","L3","L4","L5","A2","A3","A4","A5","A6","A1","A7","B1","B2","B3","B4","UU","JK","RX"];

function parseLocation(loc){
  if(!loc)return[99,99,0,99];
  const s=loc.trim().toUpperCase();
  const m=s.match(/^([A-Z]+\d*)-(\d+)-([A-Z])-(\d+)$/);
  if(m){
    const ai=AISLE_ORDER.indexOf(m[1]);
    const row=parseInt(m[2]);
    return[ai===-1?99:ai,(ai%2===1)?(1000-row):row,m[3].charCodeAt(0),parseInt(m[4])];
  }
  return[99,99,0,99];
}
function cmpLoc(a,b){
  const ka=parseLocation(a),kb=parseLocation(b);
  for(let i=0;i<4;i++){if(ka[i]!==kb[i])return ka[i]-kb[i];}
  return 0;
}

let allItems=[],activeItems=[],doneSet=new Set(),skipSet=new Set(),measurements={};

function loadData(items){
  allItems=items;doneSet.clear();skipSet.clear();measurements={};
  const uploadView=document.getElementById("upload-view");
  if(uploadView)uploadView.style.display="none";
  document.getElementById("loading-view").style.display="none";
  document.getElementById("main-view").style.display="block";
  reloadItems();
}

function reloadItems(){
  const n=parseInt(document.getElementById("count-sel").value)||20;
  // sort: tilaus desc, then serpentine
  const sorted=[...allItems].sort((a,b)=>b.tilaus-a.tilaus||cmpLoc(a.hyllypaikka,b.hyllypaikka));
  activeItems=sorted.slice(0,n==="9999"||n>=allItems.length?allItems.length:n);
  doneSet.clear();skipSet.clear();
  renderCards();updateProgress();
}

function renderCards(){
  const container=document.getElementById("cards-container");
  const summary=document.getElementById("summary-view");
  const total=activeItems.length;
  const handled=activeItems.filter(it=>doneSet.has(it.sku)||skipSet.has(it.sku)).length;

  if(handled===total&&total>0){
    container.innerHTML="";
    summary.style.display="block";
    document.getElementById("sum-done").textContent=doneSet.size;
    document.getElementById("sum-skip").textContent=skipSet.size;
    return;
  }
  summary.style.display="none";

  let html="";
  activeItems.forEach((item,i)=>{
    const isDone=doneSet.has(item.sku)||skipSet.has(item.sku);
    const m=measurements[item.sku]||{};
    const hasRef=item.height&&item.height!=="null"&&item.height!=="0"&&parseFloat(item.height)>0;
    html+=`<div class="card${isDone?" done":""}">
      <div class="card-top">
        <span class="card-idx">${i+1}</span>
        <div style="flex:1"><div class="card-name">${item.name}</div><div class="card-sku">SKU ${item.sku}</div></div>
        ${item.tilaus>0?`<span class="badge tilaus">${item.tilaus} kpl/12vko</span>`:""}
      </div>
      <div class="loc-box">
        <div class="loc-label">Hyllypaikka</div>
        <div class="loc-code">${item.hyllypaikka}</div>
      </div>
      ${hasRef?`<div class="ref-dims">Nykyinen: <strong>H ${item.height} × L ${item.length} × W ${item.width} cm</strong></div>`:`<div class="ref-dims" style="color:#c0392b">Ei aiempia dimensioita</div>`}
      ${isDone?"":"<div class=\"dim-inputs\"><div class=\"dim-group\"><label>Korkeus (H)</label><input type=\"number\" inputmode=\"decimal\" step=\"0.1\" id=\"h_"+item.sku+"\" value=\""+(m.h||"")+"\" placeholder=\"0.0\"></div><div class=\"dim-group\"><label>Pituus (L)</label><input type=\"number\" inputmode=\"decimal\" step=\"0.1\" id=\"l_"+item.sku+"\" value=\""+(m.l||"")+"\" placeholder=\"0.0\"></div><div class=\"dim-group\"><label>Leveys (W)</label><input type=\"number\" inputmode=\"decimal\" step=\"0.1\" id=\"w_"+item.sku+"\" value=\""+(m.w||"")+"\" placeholder=\"0.0\"></div></div><div class=\"btn-row\"><button class=\"btn skip-btn\" onclick=\"markSkip('"+item.sku+"')\">✕ Ohita</button><button class=\"btn primary\" onclick=\"saveDims('"+item.sku+"')\">✓ Tallenna</button></div>"}
    </div>`;
  });
  container.innerHTML=html;
}

function saveDims(sku){
  const h=document.getElementById("h_"+sku)?.value.trim();
  const l=document.getElementById("l_"+sku)?.value.trim();
  const w=document.getElementById("w_"+sku)?.value.trim();
  if(!h||!l||!w||isNaN(h)||isNaN(l)||isNaN(w)){
    alert("Syötä kaikki kolme mittaa (H, L, W)");return;
  }
  measurements[sku]={h:parseFloat(h),l:parseFloat(l),w:parseFloat(w)};
  doneSet.add(sku);skipSet.delete(sku);
  updateProgress();renderCards();
}

function markSkip(sku){
  skipSet.add(sku);doneSet.delete(sku);
  updateProgress();renderCards();
}

function updateProgress(){
  const total=activeItems.length;
  const done=activeItems.filter(it=>doneSet.has(it.sku)||skipSet.has(it.sku)).length;
  document.getElementById("prog").style.width=(total?Math.round(done/total*100):0)+"%";
  document.getElementById("done-count").textContent=done+" / "+total;
}

function resetSession(){
  doneSet.clear();skipSet.clear();measurements={};
  document.getElementById("summary-view").style.display="none";
  renderCards();updateProgress();
}

function exportCsv(){
  const sep=";";
  const toFi=v=>String(v).replace(".",",");
  const rows=[["sku","olo_height","olo_length","olo_width"].join(sep)];
  Object.entries(measurements).forEach(([sku,m])=>{
    rows.push([sku,toFi(m.h),toFi(m.l),toFi(m.w)].join(sep));
  });
  if(rows.length===1){alert("Ei mitattuja tuotteita vietäväksi.");return;}
  const blob=new Blob(["\uFEFF"+rows.join("\n")],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="dimensiot_"+new Date().toISOString().slice(0,10)+".csv";
  a.click();
}

function parseCsv(text){
  const lines=text.trim().split(/\r?\n/);
  if(lines.length<2)return[];
  const hdr=lines[0].split(",").map(h=>h.trim().replace(/^"|"$/g,""));
  const idx=n=>hdr.findIndex(h=>h.toLowerCase()===n.toLowerCase());
  const iSku=idx("sku"),iName=idx("name");
  const iHp=idx("storage_location")>=0?idx("storage_location"):idx("hyllypaikka");
  const iH=idx("height"),iL=idx("length"),iW=idx("width");
  const iOH=idx("olo_height"),iOL=idx("olo_length"),iOW=idx("olo_width");
  const iHt=idx("extinct_sales_ban")>=0?idx("extinct_sales_ban"):idx("hinnastotila");
  const iVis=idx("visibility");
  const iVar=idx("maxx_qty")>=0?idx("maxx_qty"):idx("varasto kpl");
  const iTil=idx("order_count_12_weeks")>=0?idx("order_count_12_weeks"):idx("Tilausmäärä 12 vko");
  if(iSku<0||iHp<0)return[];
  const skipHp=new Set(["uusi","vanha","null","muutto","pu",""]);
  const result=[];
  for(let i=1;i<lines.length;i++){
    const cols=lines[i].match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g)||lines[i].split(",");
    const get=j=>(cols[j]||"").replace(/^"|"$/g,"").trim();
    const hp=get(iHp);
    if(skipHp.has(hp.toLowerCase())||hp.length<5)continue;
    let tilaus=0;try{tilaus=parseInt(get(iTil))||0;}catch(e){}
    result.push({sku:get(iSku),name:get(iName),hyllypaikka:hp,
      height:get(iH),length:get(iL),width:get(iW),
      olo_height:get(iOH),olo_length:get(iOL),olo_width:get(iOW),
      hinnastotila:get(iHt),visibility:get(iVis),varasto:get(iVar),tilaus});
  }
  return result;
}

const CSV_URL="https://storage.googleapis.com/olo-export-data/export_dimensiot_app000000000000.csv";

async function fetchData(){
  const loadingView=document.getElementById("loading-view");
  const mainView=document.getElementById("main-view");
  const errDiv=document.getElementById("load-error");
  const retryBtn=document.getElementById("retry-btn");
  loadingView.style.display="block";
  mainView.style.display="none";
  errDiv.style.display="none";
  retryBtn.style.display="none";
  try{
    console.log("Fetching:", CSV_URL);
    const resp=await fetch(CSV_URL,{cache:"no-store"});
    console.log("Response status:", resp.status);
    if(!resp.ok)throw new Error("HTTP "+resp.status);
    const text=await resp.text();
    console.log("CSV length:", text.length, "first chars:", text.slice(0,80));
    const items=parseCsv(text);
    console.log("Parsed items:", items.length);
    if(!items.length)throw new Error("CSV parsinta epäonnistui");
    loadingView.style.display="none";
    loadData(items);
  }catch(err){
    console.error("fetchData error:", err);
    errDiv.textContent="Virhe: "+err.message;
    errDiv.style.display="block";
    retryBtn.style.display="inline-block";
  }
}

window.addEventListener("load", fetchData);
</script>
